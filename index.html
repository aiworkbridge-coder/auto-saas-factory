<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Data Formatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a premium dark mode feel */
        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1f2937; /* bg-gray-800 */
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #4b5563; /* bg-gray-600 */
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* bg-gray-500 */
        }
        /* General scrollbar for the body */
        body::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        body::-webkit-scrollbar-track {
            background: #0f172a; /* bg-gray-900 */
            border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb {
            background: #374151; /* bg-gray-700 */
            border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #4b5563; /* bg-gray-600 */
        }

        /* Monospace font for data textareas for better readability of code/data */
        textarea {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
        }

        /* Styles for disabled elements for better visual feedback */
        .cursor-not-allowed {
            cursor: not-allowed;
        }
        .opacity-50 {
            opacity: 0.5;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 p-6 md:p-8">

    <div class="container mx-auto max-w-6xl">
        <h1 class="text-4xl font-extrabold mb-4 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">
            Universal Data Formatter
        </h1>
        <p class="text-gray-400 mb-10 text-center text-lg max-w-3xl mx-auto">
            Effortlessly convert and format data between JSON, CSV, and Markdown Tables. Perfect for developers, data analysts, and content creators.
        </p>

        <div class="md:flex md:space-x-8 space-y-8 md:space-y-0">
            <!-- Input Section -->
            <div class="flex-1 bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-gray-200">Input Data</h2>
                    <select id="inputFormatSelect" class="bg-gray-700 text-gray-100 border border-gray-600 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 hover:border-blue-500">
                        <option value="json">JSON</option>
                        <option value="csv">CSV</option>
                        <option value="mdtable">Markdown Table</option>
                    </select>
                </div>
                <textarea id="inputArea" class="w-full h-80 bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500 transition duration-200" placeholder="Paste your data here..."></textarea>
                <div class="mt-4 flex items-center space-x-4">
                    <label id="inputFormatOptionLabel" for="inputFormatOption" class="flex items-center text-gray-300 cursor-pointer transition duration-200">
                        <input type="checkbox" id="inputFormatOption" class="form-checkbox h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 transition duration-200">
                        <span class="ml-2 text-sm">Prettify/Minify JSON</span>
                    </label>
                </div>
            </div>

            <!-- Output Section -->
            <div class="flex-1 bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-gray-200">Output Data</h2>
                    <div class="flex items-center space-x-3">
                        <select id="outputFormatSelect" class="bg-gray-700 text-gray-100 border border-gray-600 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 hover:border-blue-500">
                            <option value="json">JSON</option>
                            <option value="csv">CSV</option>
                            <option value="mdtable">Markdown Table</option>
                        </select>
                        <button id="copyOutputBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md shadow-md transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75">
                            Copy
                        </button>
                    </div>
                </div>
                <textarea id="outputArea" class="w-full h-80 bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500 transition duration-200" placeholder="Formatted data will appear here..." readonly></textarea>
                <div class="mt-4 flex items-center space-x-4">
                    <label id="outputMinifyOptionLabel" for="outputMinifyOption" class="flex items-center text-gray-300 cursor-pointer transition duration-200">
                        <input type="checkbox" id="outputMinifyOption" class="form-checkbox h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 transition duration-200">
                        <span class="ml-2 text-sm">Minify JSON Output</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="flex justify-center mt-10">
            <button id="convertBtn" class="w-full md:w-auto py-3 px-12 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-xl transform hover:scale-105 transition duration-300 focus:outline-none focus:ring-4 focus:ring-purple-500 focus:ring-opacity-50">
                Convert Data
            </button>
        </div>

        <div id="errorDisplay" class="mt-8 text-red-400 text-center font-medium min-h-[1.5rem]"></div>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const inputFormatSelect = document.getElementById('inputFormatSelect');
        const outputFormatSelect = document.getElementById('outputFormatSelect');
        const convertBtn = document.getElementById('convertBtn');
        const copyOutputBtn = document.getElementById('copyOutputBtn');
        const errorDisplay = document.getElementById('errorDisplay');
        const inputFormatOption = document.getElementById('inputFormatOption');
        const outputMinifyOption = document.getElementById('outputMinifyOption');
        const inputFormatOptionLabel = document.getElementById('inputFormatOptionLabel');
        const outputMinifyOptionLabel = document.getElementById('outputMinifyOptionLabel');

        // Helper to clear error messages
        const clearError = () => {
            errorDisplay.textContent = '';
        };

        // --- JSON Formatters ---
        const jsonParse = (text) => JSON.parse(text);
        const jsonStringify = (data, options) => {
            if (options.prettify) {
                return JSON.stringify(data, null, 2);
            }
            if (options.minify) {
                return JSON.stringify(data);
            }
            return JSON.stringify(data, null, 2); // Default to pretty for readability if no specific option is given
        };

        // --- CSV Formatters (Basic, handles common cases but not all edge cases like embedded newlines) ---
        const csvParse = (text) => {
            const lines = text.trim().split('\n').filter(line => line.trim());
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => {
                    // Basic unquoting if value is wrapped in quotes
                    if (v.startsWith('"') && v.endsWith('"')) {
                        return v.substring(1, v.length - 1).replace(/""/g, '"').trim();
                    }
                    return v.trim();
                });
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] !== undefined ? values[index] : null;
                });
                data.push(row);
            }
            return data;
        };

        const csvStringify = (data) => {
            if (!Array.isArray(data) || data.length === 0) return '';
            
            const headers = Object.keys(data[0]);
            const headerRow = headers.map(h => {
                // Wrap header in quotes if it contains comma or double quote
                if (h.includes(',') || h.includes('"')) {
                    return `"${h.replace(/"/g, '""')}"`;
                }
                return h;
            }).join(',');

            const dataRows = data.map(row =>
                headers.map(header => {
                    let value = row[header];
                    if (value === null || value === undefined) value = '';
                    if (typeof value !== 'string') value = String(value);
                    // Wrap value in quotes if it contains comma, double quote, or newline
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        value = `"${value.replace(/"/g, '""')}"`;
                    }
                    return value;
                }).join(',')
            );
            return [headerRow, ...dataRows].join('\n');
        };

        // --- Markdown Table Formatters (Basic, assumes standard GitHub Flavored Markdown tables) ---
        const mdTableParse = (text) => {
            const lines = text.trim().split('\n').filter(line => line.trim());
            if (lines.length < 2) return []; // Need at least header and separator

            let headerLine = '';
            let separatorLineIndex = -1;

            for (let i = 0; i < lines.length; i++) {
                const trimmedLine = lines[i].trim();
                if (trimmedLine.startsWith('|') && trimmedLine.endsWith('|')) {
                    if (trimmedLine.includes('---')) {
                        separatorLineIndex = i;
                        break;
                    } else if (!headerLine) {
                        headerLine = trimmedLine;
                    }
                }
            }

            if (!headerLine || separatorLineIndex === -1) {
                throw new Error("Invalid Markdown table format: Header or separator missing. Ensure format like `| H1 | H2 |\n|----|----|\n| V1 | V2 |`");
            }

            const headers = headerLine.split('|')
                                        .map(h => h.trim())
                                        .filter(h => h !== '');

            if (headers.length === 0) return [];

            const data = [];
            for (let i = separatorLineIndex + 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line.startsWith('|') || !line.endsWith('|')) continue;
                
                const values = line.split('|')
                                    .map(v => v.trim())
                                    .filter(v => v !== '');

                // Ensure data row has same number of columns as headers
                if (values.length !== headers.length) {
                    console.warn(`Row ${i + 1} has ${values.length} columns, expected ${headers.length}. Skipping.`);
                    continue;
                }

                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index];
                });
                data.push(row);
            }
            return data;
        };

        const mdTableStringify = (data) => {
            if (!Array.isArray(data) || data.length === 0) return '';
            
            const headers = Object.keys(data[0]);
            
            // Calculate max column widths for padding
            const colWidths = {};
            headers.forEach(h => {
                colWidths[h] = h.length;
            });
            data.forEach(row => {
                headers.forEach(h => {
                    const valueLength = String(row[h] || '').length;
                    if (valueLength > colWidths[h]) {
                        colWidths[h] = valueLength;
                    }
                });
            });

            // Header row
            const headerRow = '| ' + headers.map(h => h.padEnd(colWidths[h])).join(' | ') + ' |';

            // Separator row (GitHub Flavored Markdown requires at least 3 hyphens per column)
            const separatorRow = '|' + headers.map(h => '-'.repeat(Math.max(3, colWidths[h] + 2))).join('|') + '|'; 

            // Data rows
            const dataRows = data.map(row => {
                return '| ' + headers.map(h => String(row[h] || '').padEnd(colWidths[h])).join(' | ') + ' |';
            }).join('\n');

            return [headerRow, separatorRow, dataRows].join('\n');
        };

        // Mapping of format names to their parsing and stringifying functions
        const formatters = {
            json: {
                parse: jsonParse,
                stringify: (data, opts) => jsonStringify(data, { prettify: opts.prettify, minify: opts.minify }),
            },
            csv: {
                parse: csvParse,
                stringify: csvStringify,
            },
            mdtable: {
                parse: mdTableParse,
                stringify: mdTableStringify,
            }
        };

        // Main conversion logic
        const convertData = () => {
            clearError();
            const inputText = inputArea.value;
            const inputFormat = inputFormatSelect.value;
            const outputFormat = outputFormatSelect.value;

            if (!inputText.trim()) {
                outputArea.value = '';
                return; // Don't show error immediately, just clear output
            }

            let parsedData;
            try {
                parsedData = formatters[inputFormat].parse(inputText);
            } catch (e) {
                errorDisplay.textContent = `Error parsing ${inputFormat}: ${e.message}`;
                outputArea.value = '';
                console.error(`Error parsing ${inputFormat}:`, e);
                return;
            }

            try {
                let stringifyOptions = {};
                if (outputFormat === 'json') {
                    stringifyOptions = {
                        prettify: !outputMinifyOption.checked,
                        minify: outputMinifyOption.checked,
                    };
                }
                const outputText = formatters[outputFormat].stringify(parsedData, stringifyOptions);
                outputArea.value = outputText;
            } catch (e) {
                errorDisplay.textContent = `Error converting to ${outputFormat}: ${e.message}`;
                outputArea.value = '';
                console.error(`Error stringifying to ${outputFormat}:`, e);
            }
        };

        // Function to update visibility/state of format-specific options
        const updateOptionStates = () => {
            const currentInputFormat = inputFormatSelect.value;
            const currentOutputFormat = outputFormatSelect.value;

            // Input prettify/minify checkbox for JSON
            if (currentInputFormat === 'json') {
                inputFormatOptionLabel.classList.remove('opacity-50', 'cursor-not-allowed');
                inputFormatOption.disabled = false;
            } else {
                inputFormatOption.checked = false; // Uncheck if not JSON
                inputFormatOptionLabel.classList.add('opacity-50', 'cursor-not-allowed');
                inputFormatOption.disabled = true;
            }

            // Output minify checkbox for JSON
            if (currentOutputFormat === 'json') {
                outputMinifyOptionLabel.classList.remove('opacity-50', 'cursor-not-allowed');
                outputMinifyOption.disabled = false;
            } else {
                outputMinifyOption.checked = false; // Uncheck if not JSON
                outputMinifyOptionLabel.classList.add('opacity-50', 'cursor-not-allowed');
                outputMinifyOption.disabled = true;
            }
        };

        // --- Event Listeners ---
        convertBtn.addEventListener('click', convertData);

        inputFormatSelect.addEventListener('change', () => {
            updateOptionStates();
            convertData();
        });
        outputFormatSelect.addEventListener('change', () => {
            updateOptionStates();
            convertData();
        });
        outputMinifyOption.addEventListener('change', convertData); // Trigger convert on minify change

        // Input Prettify/Minify functionality (action-based on input box)
        inputFormatOption.addEventListener('change', () => {
            clearError();
            if (inputFormatSelect.value === 'json' && inputArea.value.trim()) {
                try {
                    const parsed = JSON.parse(inputArea.value);
                    inputArea.value = inputFormatOption.checked ? JSON.stringify(parsed, null, 2) : JSON.stringify(parsed);
                } catch (e) {
                    errorDisplay.textContent = `Error formatting JSON input: ${e.message}`;
                    inputFormatOption.checked = !inputFormatOption.checked; // Revert checkbox state on error
                }
            } else if (!inputArea.value.trim()) {
                errorDisplay.textContent = 'No input data to format.';
                inputFormatOption.checked = false; // Uncheck if no input
            } else if (inputFormatSelect.value !== 'json') {
                 errorDisplay.textContent = 'This option only applies to JSON input.';
                 inputFormatOption.checked = false; // Uncheck if not JSON
            }
        });

        // Copy output to clipboard
        copyOutputBtn.addEventListener('click', () => {
            if (outputArea.value) {
                navigator.clipboard.writeText(outputArea.value)
                    .then(() => {
                        const originalText = copyOutputBtn.textContent;
                        copyOutputBtn.textContent = 'Copied!';
                        setTimeout(() => {
                            copyOutputBtn.textContent = originalText;
                        }, 1500);
                    })
                    .catch(err => {
                        errorDisplay.textContent = 'Failed to copy: ' + err;
                        console.error('Failed to copy text: ', err);
                    });
            } else {
                errorDisplay.textContent = 'Nothing to copy!';
            }
        });

        // Initial setup on page load
        updateOptionStates();
    </script>
</body>
</html>
