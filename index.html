<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Refiner & Optimizer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233B82F6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M20 17.5V9.5a2.5 2.5 0 0 0-5 0V17c0 1.38-1.12 2.5-2.5 2.5s-2.5-1.12-2.5-2.5V7a2.5 2.5 0 0 0-5 0v8.5'%3E%3C/path%3E%3Cpath d='M12 19.5V17'%3E%3C/path%3E%3Cpath d='M12 17a2.5 2.5 0 0 0 5 0V7.5a2.5 2.5 0 0 0-5 0V17'%3E%3C/path%3E%3C/svg%3E" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2D3748; /* bg-gray-800 */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4A5568; /* bg-gray-600 */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6B7280; /* bg-gray-500 */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <div class="min-h-screen flex flex-col items-center py-10 px-4">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-blue-400 mb-2 drop-shadow-lg">
                AI Prompt Refiner
            </h1>
            <p class="text-xl text-gray-300 font-light">
                Craft powerful prompts for generative AI models.
            </p>
        </header>

        <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Input & Refinement Section -->
            <section class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 flex flex-col space-y-6">
                <h2 class="text-3xl font-bold text-gray-100 mb-4 border-b pb-3 border-gray-700">Refine Your Prompt</h2>

                <!-- Base Prompt -->
                <div>
                    <label for="base-prompt" class="block text-lg font-medium text-gray-300 mb-2">Base Idea <span class="text-sm text-gray-400">(Your initial thought)</span></label>
                    <textarea id="base-prompt"
                              class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 h-32 resize-y scrollbar-thin"
                              placeholder="e.g., 'Write an essay about climate change' or 'Generate code for a Python script.'"
                              oninput="updateRefinedPrompt()"
                              data-label="BASE IDEA"></textarea>
                </div>

                <!-- Refinement Modules Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Role -->
                    <div>
                        <label for="role" class="block text-lg font-medium text-gray-300 mb-2">Role <span class="text-sm text-gray-400">(Who should the AI act as?)</span></label>
                        <input type="text" id="role"
                               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 scrollbar-thin"
                               placeholder="e.g., 'an expert frontend developer', 'a compassionate therapist'"
                               oninput="updateRefinedPrompt()"
                               data-label="ROLE">
                    </div>

                    <!-- Task -->
                    <div>
                        <label for="task" class="block text-lg font-medium text-gray-300 mb-2">Task <span class="text-sm text-gray-400">(What exactly should the AI do?)</span></label>
                        <input type="text" id="task"
                               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 scrollbar-thin"
                               placeholder="e.g., 'Summarize the text', 'Generate a list of ideas', 'Explain the concept'"
                               oninput="updateRefinedPrompt()"
                               data-label="TASK">
                    </div>

                    <!-- Context -->
                    <div class="md:col-span-2">
                        <label for="context" class="block text-lg font-medium text-gray-300 mb-2">Context / Background <span class="text-sm text-gray-400">(Relevant information for the AI)</span></label>
                        <textarea id="context"
                                  class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 h-24 resize-y scrollbar-thin"
                                  placeholder="e.g., 'The user is a beginner and needs simple explanations.', 'The code should be in React with TypeScript.'"
                                  oninput="updateRefinedPrompt()"
                                  data-label="CONTEXT"></textarea>
                    </div>

                    <!-- Format -->
                    <div>
                        <label for="format" class="block text-lg font-medium text-gray-300 mb-2">Output Format <span class="text-sm text-gray-400">(How should the output be structured?)</span></label>
                        <input type="text" id="format"
                               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 scrollbar-thin"
                               placeholder="e.g., 'Markdown table', 'JSON object', 'bulleted list', 'a 500-word essay'"
                               oninput="updateRefinedPrompt()"
                               data-label="FORMAT">
                    </div>

                    <!-- Tone / Style -->
                    <div>
                        <label for="tone" class="block text-lg font-medium text-gray-300 mb-2">Tone / Style <span class="text-sm text-gray-400">(How should the AI communicate?)</span></label>
                        <input type="text" id="tone"
                               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 scrollbar-thin"
                               placeholder="e.g., 'professional', 'friendly and encouraging', 'concise and direct'"
                               oninput="updateRefinedPrompt()"
                               data-label="TONE">
                    </div>

                    <!-- Constraints -->
                    <div class="md:col-span-2">
                        <label for="constraints" class="block text-lg font-medium text-gray-300 mb-2">Constraints / Rules <span class="text-sm text-gray-400">(What should the AI avoid or adhere to?)</span></label>
                        <textarea id="constraints"
                                  class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 h-24 resize-y scrollbar-thin"
                                  placeholder="e.g., 'Do not use jargon.', 'Limit the response to 3 paragraphs.', 'Ensure factual accuracy.'"
                                  oninput="updateRefinedPrompt()"
                                  data-label="CONSTRAINTS"></textarea>
                    </div>

                    <!-- Examples -->
                    <div class="md:col-span-2">
                        <label for="examples" class="block text-lg font-medium text-gray-300 mb-2">Examples <span class="text-sm text-gray-400">(Provide input-output examples for better understanding)</span></label>
                        <textarea id="examples"
                                  class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-gray-100 h-24 resize-y scrollbar-thin"
                                  placeholder="e.g., 'Input: 'apple' -> Output: 'fruit'; Input: 'car' -> Output: 'vehicle''"
                                  oninput="updateRefinedPrompt()"
                                  data-label="EXAMPLES"></textarea>
                    </div>
                </div>
            </section>

            <!-- Output Section -->
            <section class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 flex flex-col space-y-6">
                <h2 class="text-3xl font-bold text-gray-100 mb-4 border-b pb-3 border-gray-700">Optimized Prompt Output</h2>

                <div>
                    <textarea id="refined-prompt"
                              class="w-full p-4 bg-gray-900 border border-gray-600 rounded-lg text-gray-100 h-96 resize-y font-mono text-sm scrollbar-thin"
                              readonly
                              placeholder="Your optimized prompt will appear here as you refine it."></textarea>
                </div>

                <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                    <button onclick="copyToClipboard()"
                            class="w-full sm:w-auto px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800">
                        Copy to Clipboard
                    </button>
                    <div class="text-gray-400 text-sm flex gap-4">
                        <span id="word-count">Words: 0</span>
                        <span id="char-count">Characters: 0</span>
                    </div>
                </div>

                <div id="copy-message" class="text-green-400 text-center mt-2 opacity-0 transition-opacity duration-300">
                    Prompt copied to clipboard!
                </div>
            </section>
        </main>

        <footer class="mt-12 text-gray-500 text-sm">
            &copy; 2023 AI Prompt Refiner. Built with passion and code.
        </footer>
    </div>

    <script>
        const elements = {};
        ['base-prompt', 'role', 'task', 'context', 'format', 'tone', 'constraints', 'examples', 'refined-prompt', 'word-count', 'char-count', 'copy-message'].forEach(id => {
            elements[id] = document.getElementById(id);
        });

        function updateRefinedPrompt() {
            const sections = [
                { id: 'base-prompt', label: elements['base-prompt'].dataset.label, prefix: '', suffix: '', type: 'textarea' },
                { id: 'role', label: elements['role'].dataset.label, prefix: 'You are ', suffix: '.' },
                { id: 'task', label: elements['task'].dataset.label, prefix: 'Your task is to ', suffix: '.' },
                { id: 'context', label: elements['context'].dataset.label, prefix: 'Given the following context: ', suffix: '.' },
                { id: 'format', label: elements['format'].dataset.label, prefix: 'Present the output in the following format: ', suffix: '.' },
                { id: 'tone', label: elements['tone'].dataset.label, prefix: 'The tone should be ', suffix: '.' },
                { id: 'constraints', label: elements['constraints'].dataset.label, prefix: 'Adhere to these constraints: ', suffix: '.' },
                { id: 'examples', label: elements['examples'].dataset.label, prefix: 'Here are some examples: ', suffix: '.' }
            ];

            let promptParts = [];

            sections.forEach(section => {
                const value = elements[section.id].value.trim();
                if (value) {
                    let formattedValue = value;

                    // Add prefix/suffix only if not a base prompt and value exists
                    if (section.id !== 'base-prompt') {
                        formattedValue = `${section.prefix}${value}${section.suffix}`;
                    }

                    // For multi-line inputs, ensure each line is handled
                    if (section.type === 'textarea' || value.includes('\n')) {
                        const lines = formattedValue.split('\n').filter(line => line.trim() !== '');
                        if (lines.length > 0) {
                            promptParts.push(`${section.label}:\n${lines.map(line => `- ${line.trim()}`).join('\n')}`);
                        }
                    } else {
                        promptParts.push(`${section.label}: ${formattedValue}`);
                    }
                }
            });

            const finalPrompt = promptParts.join('\n\n');
            elements['refined-prompt'].value = finalPrompt;

            // Update word and character counts
            const text = finalPrompt;
            elements['word-count'].textContent = `Words: ${text.split(/\s+/).filter(word => word.length > 0).length}`;
            elements['char-count'].textContent = `Characters: ${text.length}`;
        }

        function copyToClipboard() {
            const refinedPromptText = elements['refined-prompt'].value;
            if (refinedPromptText) {
                navigator.clipboard.writeText(refinedPromptText).then(() => {
                    elements['copy-message'].classList.remove('opacity-0');
                    elements['copy-message'].classList.add('opacity-100');
                    setTimeout(() => {
                        elements['copy-message'].classList.remove('opacity-100');
                        elements['copy-message'].classList.add('opacity-0');
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                    alert('Failed to copy prompt to clipboard. Please copy manually.');
                });
            }
        }

        // Initial update on page load
        updateRefinedPrompt();
    </script>
</body>
</html>
