<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Architect & Token Estimator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 sm:p-8 flex flex-col items-center">

    <div class="w-full max-w-6xl mx-auto space-y-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-blue-400 mb-2 leading-tight">AI Prompt Architect</h1>
            <p class="text-xl sm:text-2xl text-gray-300 font-light">Craft structured prompts with real-time token estimation.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Prompt Builder Section -->
            <section class="bg-gray-900 p-6 sm:p-8 rounded-xl shadow-lg border border-gray-800 flex flex-col space-y-6">
                <h2 class="text-2xl font-bold text-gray-200 border-b border-gray-700 pb-4 mb-4">Prompt Components</h2>

                <div>
                    <label for="persona" class="block text-sm font-medium text-gray-400 mb-2">Persona (Optional)</label>
                    <textarea id="persona" rows="2" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'You are an expert content strategist.'"></textarea>
                </div>

                <div>
                    <label for="task" class="block text-sm font-medium text-gray-400 mb-2">Task <span class="text-red-400">*</span></label>
                    <textarea id="task" rows="3" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'Generate 5 unique blog post ideas about sustainable living for millennials.'"></textarea>
                </div>

                <div>
                    <label for="context" class="block text-sm font-medium text-gray-400 mb-2">Context (Optional)</label>
                    <textarea id="context" rows="4" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'The target audience is eco-conscious millennials aged 25-35. Our brand promotes zero-waste products.'"></textarea>
                </div>

                <div>
                    <label for="format" class="block text-sm font-medium text-gray-400 mb-2">Format (Optional)</label>
                    <textarea id="format" rows="2" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'Provide output as a numbered list with a catchy title and a 2-sentence description for each idea.'"></textarea>
                </div>

                <div>
                    <label for="constraints" class="block text-sm font-medium text-gray-400 mb-2">Constraints (Optional)</label>
                    <textarea id="constraints" rows="2" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'Avoid jargon. Do not exceed 500 words in total. Focus on actionable tips.'"></textarea>
                </div>

                <div>
                    <label for="examples" class="block text-sm font-medium text-gray-400 mb-2">Examples (Optional)</label>
                    <textarea id="examples" rows="3" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="e.g., 'Example idea: 'Zero-Waste Kitchen Hacks: Your Guide to Sustainable Cooking'.'"></textarea>
                </div>

                <div class="flex flex-wrap gap-4 mt-6">
                    <button id="generatePromptBtn" class="flex-grow sm:flex-initial px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all duration-200 text-center">
                        Generate Prompt
                    </button>
                    <button id="clearAllBtn" class="flex-grow sm:flex-initial px-6 py-3 bg-gray-700 text-gray-200 font-semibold rounded-lg shadow-md hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all duration-200 text-center">
                        Clear All
                    </button>
                </div>
            </section>

            <!-- Generated Prompt & Tools Section -->
            <section class="bg-gray-900 p-6 sm:p-8 rounded-xl shadow-lg border border-gray-800 flex flex-col space-y-6">
                <h2 class="text-2xl font-bold text-gray-200 border-b border-gray-700 pb-4 mb-4">Generated Prompt</h2>

                <div>
                    <label for="generatedPrompt" class="block text-sm font-medium text-gray-400 mb-2">Your Structured Prompt</label>
                    <textarea id="generatedPrompt" rows="20" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-colors duration-200 resize-none" placeholder="Your generated AI prompt will appear here..." readonly></textarea>
                </div>

                <div class="bg-gray-800 p-4 rounded-lg flex items-center justify-between">
                    <span class="text-gray-300 font-medium">Estimated Tokens:</span>
                    <span id="tokenEstimate" class="text-blue-400 text-xl font-bold">0</span>
                </div>

                <button id="copyToClipboardBtn" class="w-full px-6 py-3 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all duration-200">
                    Copy to Clipboard
                </button>
                <div id="copySuccessMessage" class="hidden text-center text-sm text-green-400 mt-2">Copied to clipboard!</div>
            </section>
        </div>
    </div>

    <script>
        const personaEl = document.getElementById('persona');
        const taskEl = document.getElementById('task');
        const contextEl = document.getElementById('context');
        const formatEl = document.getElementById('format');
        const constraintsEl = document.getElementById('constraints');
        const examplesEl = document.getElementById('examples');
        const generatedPromptEl = document.getElementById('generatedPrompt');
        const tokenEstimateEl = document.getElementById('tokenEstimate');
        const generatePromptBtn = document.getElementById('generatePromptBtn');
        const copyToClipboardBtn = document.getElementById('copyToClipboardBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const copySuccessMessage = document.getElementById('copySuccessMessage');

        // Simple token estimation (approximate for English text)
        // A common rule of thumb for GPT models is ~4 characters per token.
        function estimateTokens(text) {
            if (!text) return 0;
            return Math.ceil(text.length / 4);
        }

        function updateTokenEstimate() {
            const promptText = generatedPromptEl.value;
            tokenEstimateEl.textContent = estimateTokens(promptText);
        }

        function generatePrompt() {
            let prompt = [];

            if (personaEl.value.trim()) {
                prompt.push(`**Persona:** ${personaEl.value.trim()}`);
            }
            if (taskEl.value.trim()) {
                prompt.push(`**Task:** ${taskEl.value.trim()}`);
            } else {
                alert('The "Task" field is required to generate a useful prompt.');
                taskEl.focus();
                return;
            }
            if (contextEl.value.trim()) {
                prompt.push(`**Context:** ${contextEl.value.trim()}`);
            }
            if (formatEl.value.trim()) {
                prompt.push(`**Format:** ${formatEl.value.trim()}`);
            }
            if (constraintsEl.value.trim()) {
                prompt.push(`**Constraints:** ${constraintsEl.value.trim()}`);
            }
            if (examplesEl.value.trim()) {
                prompt.push(`**Examples:**\n${examplesEl.value.trim()}`);
            }

            generatedPromptEl.value = prompt.join('\n\n') + '\n\n---END PROMPT---';
            updateTokenEstimate();
        }

        function copyToClipboard() {
            if (generatedPromptEl.value) {
                navigator.clipboard.writeText(generatedPromptEl.value)
                    .then(() => {
                        copySuccessMessage.classList.remove('hidden');
                        setTimeout(() => {
                            copySuccessMessage.classList.add('hidden');
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('Failed to copy: ', err);
                        alert('Failed to copy prompt to clipboard. Please try again or copy manually.');
                    });
            }
        }

        function clearAll() {
            personaEl.value = '';
            taskEl.value = '';
            contextEl.value = '';
            formatEl.value = '';
            constraintsEl.value = '';
            examplesEl.value = '';
            generatedPromptEl.value = '';
            updateTokenEstimate();
            copySuccessMessage.classList.add('hidden'); // Hide any previous copy message
        }

        // Event Listeners
        generatePromptBtn.addEventListener('click', generatePrompt);
        copyToClipboardBtn.addEventListener('click', copyToClipboard);
        clearAllBtn.addEventListener('click', clearAll);

        // Optional: Update token estimate on input for immediate feedback
        const inputElements = [personaEl, taskEl, contextEl, formatEl, constraintsEl, examplesEl];
        inputElements.forEach(el => el.addEventListener('input', () => {
             // Re-generate prompt and update token estimate if any input changes after initial generation
             // Or, simply update the generated prompt visually and its token estimate
             // For simplicity, let's keep it on button click for generatePrompt,
             // but if we want *live* generation, uncomment this:
             // generatePrompt();
        }));

        // Initial update
        updateTokenEstimate();
    </script>
</body>
</html>
